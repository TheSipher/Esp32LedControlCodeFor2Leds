<!DOCTYPE html>
<html>
<head>
<title>Smart Home Controller</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main Card */
.container{
    background:white;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
}

/* Title */
.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:30px;
    color:#333;
}

/* Device Row */
.device{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:25px 0;
    padding:18px;
    border-radius:12px;
    background:#f4f6fb;
}

/* Device Name */
.device span{
    font-size:24px;
    font-weight:600;
}

/* Toggle Switch */
.switch{
    position:relative;
    display:inline-block;
    width:70px;
    height:40px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background-color:#ccc;
    transition:.4s;
    border-radius:40px;
}

.slider:before{
    position:absolute;
    content:"";
    height:32px;
    width:32px;
    left:4px;
    bottom:4px;
    background:white;
    transition:.4s;
    border-radius:50%;
}

input:checked + .slider{
    background:#4CAF50;
}

input:checked + .slider:before{
    transform:translateX(30px);
}

/* Footer */
.footer{
    margin-top:20px;
    font-size:14px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Smart Home</div>

<div class="device">
<span>Light</span>

<label class="switch">
<input type="checkbox" id="led1">
<span class="slider"></span>
</label>

</div>


<div class="device">
<span>Fan</span>

<label class="switch">
<input type="checkbox" id="led2">
<span class="slider"></span>
</label>

</div>

<div class="footer">
ESP32 Firebase Controller
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
  databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const led1 = document.getElementById("led1");
const led2 = document.getElementById("led2");

/* Send Data */

led1.addEventListener("change",()=>{
    set(ref(db,"led1"),led1.checked ? 1 : 0);
});

led2.addEventListener("change",()=>{
    set(ref(db,"led2"),led2.checked ? 1 : 0);
});

/* Read Data */

onValue(ref(db,"led1"),(snapshot)=>{
    led1.checked = snapshot.val()==1;
});

onValue(ref(db,"led2"),(snapshot)=>{
    led2.checked = snapshot.val()==1;
});

</script>

</body>
</html>
